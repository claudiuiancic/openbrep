name: Tests

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint GDL knowledge
        run: python knowledge/scripts/lint-knowledge.py knowledge

      - name: Smoke-test GDL knowledge context
        run: python scripts/knowledge_context_smoke.py --json

      - name: Run tests
        run: python -m pytest tests/ -q
