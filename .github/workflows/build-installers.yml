name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build macOS package
        if: runner.os == 'macOS'
        run: bash scripts/build_macos.sh

      - name: Build Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Smoke-test macOS package
        if: runner.os == 'macOS'
        run: |
          ZIP="$(ls release/OpenBrep-*-macOS.zip | head -n 1)"
          python scripts/package_smoke.py "$ZIP" --timeout 90

      - name: Install Playwright browser
        if: runner.os == 'macOS'
        run: |
          python -m pip install playwright
          python -m playwright install chromium

      - name: Browser-smoke macOS package
        if: runner.os == 'macOS'
        run: |
          ZIP="$(ls release/OpenBrep-*-macOS.zip | head -n 1)"
          python scripts/package_browser_smoke.py "$ZIP" --timeout 120

      - name: Smoke-test Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = Get-ChildItem release/OpenBrep-*-Windows.zip | Select-Object -First 1
          if (-not $zip) {
            throw "No Windows package zip found in release/"
          }
          python scripts/package_smoke.py $zip.FullName --timeout 120

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: OpenBrep-macOS
          path: release/OpenBrep-*-macOS.zip

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: OpenBrep-Windows
          path: release/OpenBrep-*-Windows.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find release-artifacts -type f -name '*.zip' -exec cp {} release/ \;
          ls -la release

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/*.zip --clobber --repo "$GH_REPO"
          else
            gh release create "$TAG_NAME" release/*.zip \
              --repo "$GH_REPO" \
              --verify-tag \
              --title "OpenBrep $TAG_NAME" \
              --generate-notes \
              --latest
          fi
